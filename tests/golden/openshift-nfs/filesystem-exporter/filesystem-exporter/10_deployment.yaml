apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: exporter
    app.kubernetes.io/name: filesystem-exporter
    filesystem_exporter_instance: filesystem-exporter
  name: filesystem-exporter
  namespace: syn-filesystem-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: exporter
      app.kubernetes.io/name: filesystem-exporter
      filesystem_exporter_instance: filesystem-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/component: exporter
        app.kubernetes.io/name: filesystem-exporter
        filesystem_exporter_instance: filesystem-exporter
    spec:
      containers:
        - args:
            - -filesystem.path=/data
            - -filesystem.report-child-dirs=false
            - -collector.interval=5m
            - -collector.timeout=2m
            - -web.listen-address=:9799
            - -web.metrics-path=/metrics
          image: ghcr.io/containeroo/filesystem-exporter:v1.2.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http-metrics
          name: filesystem-exporter
          ports:
            - containerPort: 9799
              name: http-metrics
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http-metrics
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /-/healthy
              port: http-metrics
            periodSeconds: 5
          volumeMounts:
            - mountPath: /data
              name: data
              readOnly: true
      serviceAccountName: filesystem-exporter
      terminationGracePeriodSeconds: 30
      volumes:
        - name: data
          nfs:
            path: /exports/data
            server: nfs.example.internal
