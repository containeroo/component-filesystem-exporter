apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/component: exporter
    app.kubernetes.io/name: filesystem-exporter
    filesystem_exporter_instance: filesystem-exporter
  name: system:openshift:scc:hostmount-anyuid
  namespace: syn-filesystem-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:hostmount-anyuid
subjects:
  - kind: ServiceAccount
    name: filesystem-exporter
    namespace: syn-filesystem-exporter
