apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    monitoring.syn.tools/enabled: 'true'
    prometheus: main
    role: alert-rules
  name: filesystem-exporter
  namespace: syn-filesystem-exporter
spec:
  groups:
    - name: filesystem-exporter.rules
      rules:
        - alert: FilesystemExporterCollectionFailing
          annotations:
            description: filesystem-exporter for {{ $labels.root_path }} has failed
              every collection for the last 10m.
            summary: filesystem-exporter has not completed a successful collection
          expr: max_over_time(filesystem_exporter_collect_success{filesystem_exporter_instance="filesystem-exporter",root_path="/data"}[10m])
            < 1
          for: 10m
          labels:
            severity: warning
            syn: 'true'
            syn_component: filesystem-exporter
        - alert: FilesystemExporterCollectionStale
          annotations:
            description: filesystem-exporter for {{ $labels.root_path }} has not produced
              a fresh collection timestamp for more than 900 seconds.
            summary: filesystem-exporter metrics are stale
          expr: time() - filesystem_exporter_collect_timestamp_seconds{filesystem_exporter_instance="filesystem-exporter",root_path="/data"}
            > 900
          for: 5m
          labels:
            severity: warning
            syn: 'true'
            syn_component: filesystem-exporter
        - alert: FilesystemUsageCritical
          annotations:
            description: Less than 5% free space remains on {{ $labels.path }}.
            summary: filesystem free space is critically low
          expr: filesystem_exporter_path_available_bytes{filesystem_exporter_instance="filesystem-exporter",root_path="/data",path="/data"}
            / filesystem_exporter_path_capacity_bytes{filesystem_exporter_instance="filesystem-exporter",root_path="/data",path="/data"}
            < 0.05
          for: 15m
          labels:
            severity: critical
            syn: 'true'
            syn_component: filesystem-exporter
        - alert: FilesystemUsageHigh
          annotations:
            description: Less than 10% free space remains on {{ $labels.path }}.
            summary: filesystem free space is low
          expr: filesystem_exporter_path_available_bytes{filesystem_exporter_instance="filesystem-exporter",root_path="/data",path="/data"}
            / filesystem_exporter_path_capacity_bytes{filesystem_exporter_instance="filesystem-exporter",root_path="/data",path="/data"}
            < 0.1
          for: 15m
          labels:
            severity: warning
            syn: 'true'
            syn_component: filesystem-exporter
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    app.kubernetes.io/component: exporter
    app.kubernetes.io/name: filesystem-exporter
    monitoring.syn.tools/enabled: 'true'
    prometheus: main
  name: filesystem-exporter
  namespace: syn-filesystem-exporter
spec:
  endpoints:
    - interval: 30s
      path: /metrics
      port: http-metrics
  namespaceSelector:
    matchNames:
      - syn-filesystem-exporter
  selector:
    matchLabels:
      app.kubernetes.io/component: exporter
      app.kubernetes.io/name: filesystem-exporter
  targetLabels:
    - filesystem_exporter_instance
