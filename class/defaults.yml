parameters:
  filesystem_exporter:
    =_metadata:
      multi_instance: true
      multi_tenant: true
    namespace: syn-${_instance}
    images:
      exporter:
        registry: ghcr.io
        repository: containeroo/filesystem-exporter
        tag: v1.2.1
    report_child_dirs: false
    volume: null
    monitoring_enabled: true
    grafana_dashboard:
      enabled: false
