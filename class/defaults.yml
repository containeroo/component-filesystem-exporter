---
parameters:
  filesystem_exporter:
    =_metadata:
      multi_instance: true
      multi_tenant: true
    namespace: syn-${_instance}
    images:
      exporter:
        registry: ghcr.io
        repository: containeroo/filesystem-exporter
        tag: v1.4.0
    log_level: info
    collector:
      interval: 5m
      timeout: 2m
    report_child_dirs: false
    scan_concurrency: 1
    volume: null
    monitoring_enabled: true
    grafana_dashboard:
      enabled: false
